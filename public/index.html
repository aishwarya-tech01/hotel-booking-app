<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saurabh's Admin Matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h1>Saurabh's Management Matrix</h1>
        <h2>Active Reservations Ledger</h2>
        
        <table id="adminTable">
            <tr>
                <th>Booking ID</th>
                <th>Guest Name</th>
                <th>Room #</th>
                <th>Check In</th>
                <th>Check Out</th>
            </tr>
        </table>
        
        <br><br>
        <a href="index.html" style="color: #00ffcc;">[ RETURN TO MAIN TERMINAL ]</a>
    </div>

    <script>
        async function loadAdminData() {
            const res = await fetch('/api/admin/bookings');
            const bookings = await res.json();
            const table = document.getElementById('adminTable');

            bookings.forEach(b => {
                const row = table.insertRow();
                row.insertCell(0).innerText = b.id;
                row.insertCell(1).innerText = b.guest_name;
                row.insertCell(2).innerText = b.room_number;
                row.insertCell(3).innerText = b.check_in_date.split('T')[0]; 
                row.insertCell(4).innerText = b.check_out_date.split('T')[0];
            });
        }
        
        loadAdminData();
    </script>
</body>
</html>
